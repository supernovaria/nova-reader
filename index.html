<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Reader</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e63946">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf9;
      --text: #1d1d1f;
      --accent: #e63946;
      --muted: rgba(128, 128, 128, 0.7);
      --border: rgba(128, 128, 128, 0.2);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --text: #e8e6e3;
        --accent: #ff6b6b;
        --border: rgba(128, 128, 128, 0.3);
      }
    }

    html, body {
      height: 100%;
      font-family: 'Atkinson Hyperlegible', 'Verdana', 'Trebuchet MS', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      text-align: center;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-top: -12px;
    }

    textarea {
      width: 100%;
      min-height: 200px;
      max-height: 50vh;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--muted);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .hint {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .hint a {
      color: var(--accent);
      text-decoration: none;
    }

    .hint a:hover {
      text-decoration: underline;
    }

    kbd {
      display: inline-block;
      padding: 1px 6px;
      background: rgba(128, 128, 128, 0.1);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
    }

    .controls-hint {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>N<span>o</span>va Reader</h1>
    <p class="subtitle">RSVP speed reader</p>

    <textarea id="paste-area" placeholder="Paste your text here..." autofocus></textarea>

    <button class="btn-primary" id="btn-start" disabled>Start Reading</button>

    <div class="controls-hint">
      <kbd>Space</kbd> pause/resume &nbsp;
      <kbd>S</kbd>/<kbd>D</kbd> slower/faster &nbsp;
      <kbd>&larr;</kbd><kbd>&rarr;</kbd> word &nbsp;
      <kbd>&uarr;</kbd><kbd>&darr;</kbd> paragraph
    </div>
  </div>

  <script>
    // Register service worker (required for PWA install + share target)
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }

    const textarea = document.getElementById("paste-area");
    const btn = document.getElementById("btn-start");

    // Handle share target: populate textarea with shared text/url
    const params = new URLSearchParams(location.search);
    const sharedText = params.get("text") || "";
    const sharedUrl = params.get("url") || "";
    const sharedTitle = params.get("title") || "";
    const shared = [sharedTitle, sharedText, sharedUrl].filter(Boolean).join("\n\n");
    if (shared) {
      textarea.value = shared;
      btn.disabled = false;
      // Clean URL so refreshing doesn't re-share
      history.replaceState(null, "", location.pathname);
    }

    textarea.addEventListener("input", () => {
      btn.disabled = !textarea.value.trim();
    });

    btn.addEventListener("click", () => {
      const text = textarea.value.trim();
      if (!text) return;
      sessionStorage.setItem("novaReaderText", text);
      sessionStorage.removeItem("novaReaderBlocks");
      window.location.href = "reader.html";
    });

    // Also allow Ctrl/Cmd+Enter to start
    textarea.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter" && textarea.value.trim()) {
        btn.click();
      }
    });
  </script>
</body>
</html>
