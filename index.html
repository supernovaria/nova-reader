<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Reader</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e63946">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf9;
      --text: #1d1d1f;
      --accent: #e63946;
      --muted: rgba(128, 128, 128, 0.7);
      --border: rgba(128, 128, 128, 0.2);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --text: #e8e6e3;
        --accent: #ff6b6b;
        --border: rgba(128, 128, 128, 0.3);
      }
    }

    html, body {
      height: 100%;
      font-family: 'Atkinson Hyperlegible', 'Verdana', 'Trebuchet MS', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      text-align: center;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-top: -12px;
    }

    textarea {
      width: 100%;
      min-height: 200px;
      max-height: 50vh;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--muted);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .hint {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .hint a {
      color: var(--accent);
      text-decoration: none;
    }

    .hint a:hover {
      text-decoration: underline;
    }

    kbd {
      display: inline-block;
      padding: 1px 6px;
      background: rgba(128, 128, 128, 0.1);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
    }

    .settings-section {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0;
    }
    .settings-section summary {
      padding: 10px 16px;
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
    }
    .settings-section[open] summary {
      border-bottom: 1px solid var(--border);
    }
    .settings-grid {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .settings-grid label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--text);
    }
    .settings-grid input {
      width: 80px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      text-align: right;
    }
    .btn-save {
      width: 100%;
      padding: 8px;
      border: none;
      border-top: 1px solid var(--border);
      background: none;
      color: var(--accent);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save:hover { opacity: 0.7; }

    .controls-hint {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>N<span>o</span>va Reader</h1>
    <p class="subtitle">RSVP speed reader</p>

    <textarea id="paste-area" placeholder="Paste a URL or text here..." autofocus></textarea>

    <button class="btn-primary" id="btn-start" disabled>Start Reading</button>
    <p id="status-msg" class="hint"></p>

    <details class="settings-section">
      <summary>Settings</summary>
      <div class="settings-grid">
        <label>WPM <input type="number" id="s-wpm" min="50" max="1500"></label>
        <label>Target WPM <input type="number" id="s-targetWpm" min="0" max="1500" placeholder="0 = off"></label>
        <label>Ramp minutes <input type="number" id="s-targetWpmRampMinutes" min="0.5" max="60" step="0.5"></label>
      </div>
      <button class="btn-save" id="btn-save-settings">Save</button>
    </details>

    <div class="controls-hint">
      <kbd>Space</kbd> pause/resume &nbsp;
      <kbd>S</kbd>/<kbd>D</kbd> slower/faster &nbsp;
      <kbd>W</kbd> toggle target speed &nbsp;
      <kbd>&larr;</kbd><kbd>&rarr;</kbd> word &nbsp;
      <kbd>&uarr;</kbd><kbd>&darr;</kbd> paragraph
    </div>
  </div>

  <script>
    // Register service worker (required for PWA install + share target)
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }

    const textarea = document.getElementById("paste-area");
    const btn = document.getElementById("btn-start");
    const statusMsg = document.getElementById("status-msg");

    // Load settings into form
    loadSettings().then(s => {
      document.getElementById("s-wpm").value = s.wpm;
      document.getElementById("s-targetWpm").value = s.targetWpm || "";
      document.getElementById("s-targetWpmRampMinutes").value = s.targetWpmRampMinutes;
    });
    document.getElementById("btn-save-settings").addEventListener("click", async () => {
      const s = await loadSettings();
      s.wpm = parseInt(document.getElementById("s-wpm").value, 10) || s.wpm;
      s.targetWpm = parseInt(document.getElementById("s-targetWpm").value, 10) || 0;
      s.targetWpmRampMinutes = parseFloat(document.getElementById("s-targetWpmRampMinutes").value) || 5;
      await saveSettings(s);
      const btn = document.getElementById("btn-save-settings");
      btn.textContent = "Saved!";
      setTimeout(() => btn.textContent = "Save", 1000);
    });

    // Handle share target: populate textarea with shared text/url
    const params = new URLSearchParams(location.search);
    const sharedText = params.get("text") || "";
    const sharedUrl = params.get("url") || "";
    const sharedTitle = params.get("title") || "";
    // Find a URL from any of the shared fields (apps send URLs in different params)
    const urlFromFields = [sharedUrl, sharedText, sharedTitle]
      .flatMap(s => s.split(/\s+/))
      .find(s => /^https?:\/\/\S+$/.test(s));
    const shared = urlFromFields || [sharedTitle, sharedText, sharedUrl].filter(Boolean).join("\n\n");
    if (shared) {
      history.replaceState(null, "", location.pathname);
      if (urlFromFields) {
        // Auto-fetch URL and go straight to reader
        textarea.value = urlFromFields;
        btn.disabled = true;
        statusMsg.textContent = "Fetching article...";
        fetchAndRead(urlFromFields);
      } else {
        textarea.value = shared;
        btn.disabled = false;
      }
    }

    function looksLikeUrl(text) {
      // Single line that starts with http(s)
      return /^https?:\/\/\S+$/.test(text.trim()) && !text.includes("\n");
    }

    // Try each CORS proxy in order. Public proxies go down sporadically,
    // so a fallback keeps URL-fetch working when the primary is unavailable.
    const PROXIES = [
      (u) => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
      (u) => "https://corsproxy.io/?" + encodeURIComponent(u),
    ];

    async function fetchArticle(url) {
      let lastErr;
      for (const makeProxyUrl of PROXIES) {
        try {
          const resp = await fetch(makeProxyUrl(url));
          if (!resp.ok) { lastErr = new Error("HTTP " + resp.status); continue; }
          const html = await resp.text();
          const extracted = extractArticle(html, url);
          if (extracted && extracted.text && extracted.text.length > 100) return extracted;
          lastErr = new Error("empty");
        } catch (e) { lastErr = e; }
      }
      throw lastErr || new Error("All proxies failed");
    }

    // Fetch URL and go straight to reader
    async function fetchAndRead(url) {
      try {
        const extracted = await fetchArticle(url);
        sessionStorage.setItem("novaReaderText", extracted.text);
        if (extracted.blocks && extracted.blocks.length) {
          sessionStorage.setItem("novaReaderBlocks", JSON.stringify(extracted.blocks));
        } else {
          sessionStorage.removeItem("novaReaderBlocks");
        }
        window.location.href = "reader.html";
        return;
      } catch {}
      // Fallback: show textarea with URL
      statusMsg.textContent = "Could not fetch article. Paste the text manually.";
      textarea.value = url;
      btn.disabled = false;
    }

    // Walk an element and produce a string where inline <a href> content is
    // wrapped in markdown-link syntax [text](absoluteUrl). Other inline tags
    // pass through as plain text. Used inside a leaf block (p/li/h*/etc.).
    function textWithLinks(el, baseUrl) {
      let out = "";
      const abs = (href) => {
        try { return new URL(href, baseUrl).href; } catch { return href; }
      };
      const esc = (s) => s.replace(/([\[\]()\\])/g, "\\$1");
      const walk = (node) => {
        if (node.nodeType === 3) { out += node.textContent; return; }
        if (node.nodeType !== 1) return;
        if (node.tagName === "A" && node.getAttribute("href")) {
          const href = node.getAttribute("href");
          if (href.startsWith("javascript:") || !node.textContent.trim()) {
            for (const ch of node.childNodes) walk(ch);
            return;
          }
          const inner = node.textContent.replace(/\s+/g, " ").trim();
          if (inner) out += "[" + esc(inner) + "](" + abs(href) + ")";
          return;
        }
        if (node.tagName === "BR") { out += " "; return; }
        for (const ch of node.childNodes) walk(ch);
      };
      walk(el);
      return out.replace(/\s+/g, " ").trim();
    }

    function extractArticle(html, url) {
      const doc = new DOMParser().parseFromString(html, "text/html");

      // Remove non-content elements
      const remove = "script,style,nav,header,footer,aside,iframe,form,button,svg,noscript,[role=navigation],[role=banner],[role=complementary],.sidebar,.nav,.menu,.footer,.header,.comments,.ad,.advertisement";
      doc.querySelectorAll(remove).forEach(el => el.remove());

      // Try <article> first, then <main>, then fall back to largest text block
      let root = doc.querySelector("article") || doc.querySelector("main") || doc.querySelector("[role=main]");

      if (!root) {
        let best = null, bestLen = 0;
        doc.querySelectorAll("div, section").forEach(el => {
          const ps = el.querySelectorAll("p");
          let len = 0;
          ps.forEach(p => len += p.textContent.length);
          if (len > bestLen) { bestLen = len; best = el; }
        });
        root = best || doc.body;
      }

      // Walk in document order and emit structured blocks. Images become their
      // own block (so the reader can show an image overlay). Text blocks are
      // filtered to LEAVES — a <blockquote> wrapping <p>s would otherwise
      // smush children together with no whitespace ("down.It" bug).
      const BLOCK_SEL = "h1,h2,h3,h4,h5,h6,p,li,blockquote,pre,img";
      const allNodes = Array.from(root.querySelectorAll(BLOCK_SEL));
      const nodeSet = new Set(allNodes);
      const blocks = [];
      const textParts = [];
      const seenImg = new Set();

      for (const el of allNodes) {
        const tag = el.tagName.toLowerCase();

        if (tag === "img") {
          const src = el.getAttribute("src") || "";
          if (!src || src.startsWith("data:") || seenImg.has(src)) continue;
          const w = parseInt(el.getAttribute("width")) || 0;
          const h = parseInt(el.getAttribute("height")) || 0;
          if ((w > 0 && w < 80) || (h > 0 && h < 80)) continue;
          if (/tracking|pixel|spacer|badge|avatar|logo|icon/i.test(src)) continue;
          let absSrc = src;
          try { absSrc = new URL(src, url).href; } catch {}
          seenImg.add(src);
          blocks.push({ type: "image", src: absSrc, alt: el.alt || "" });
          continue;
        }

        // Skip non-leaf text blocks
        let isLeaf = true;
        for (const desc of el.querySelectorAll(BLOCK_SEL)) {
          if (nodeSet.has(desc) && desc.tagName.toLowerCase() !== "img") { isLeaf = false; break; }
        }
        if (!isLeaf) continue;

        const body = textWithLinks(el, url);
        if (!body) continue;

        const hMatch = tag.match(/^h([1-6])$/);
        if (hMatch) {
          blocks.push({ type: "heading", level: parseInt(hMatch[1]), text: body });
          textParts.push("\n" + "#".repeat(parseInt(hMatch[1])) + " " + body + "\n");
        } else if (tag === "li") {
          blocks.push({ type: "paragraph", text: body });
          textParts.push("- " + body);
        } else if (tag === "blockquote") {
          blocks.push({ type: "paragraph", text: body });
          textParts.push("> " + body);
        } else {
          blocks.push({ type: "paragraph", text: body });
          textParts.push(body);
        }
      }

      return { text: textParts.join("\n\n"), blocks };
    }

    textarea.addEventListener("input", () => {
      btn.disabled = !textarea.value.trim();
      statusMsg.textContent = "";
    });

    btn.addEventListener("click", async () => {
      const text = textarea.value.trim();
      if (!text) return;
      if (looksLikeUrl(text)) {
        btn.disabled = true;
        statusMsg.textContent = "Fetching article...";
        await fetchAndRead(text);
        return;
      }
      sessionStorage.setItem("novaReaderText", text);
      sessionStorage.removeItem("novaReaderBlocks");
      window.location.href = "reader.html";
    });

    // Ctrl/Cmd+Enter to start
    textarea.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter" && textarea.value.trim()) {
        btn.click();
      }
    });
  </script>
</body>
</html>
